name: Deploy Compound Platform

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/778177955406/locations/global/workloadIdentityPools/compound-pool/providers/compound-provider'
          service_account: 'github-deployer@compound-learning-389172.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & Push Backend
        run: |
          gcloud builds submit --config=cloudbuild-backend.yaml . --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          gcloud run deploy compound-api \
            --image=asia-south1-docker.pkg.dev/${GCP_PROJECT_ID}/compound/api:latest \
            --platform=managed \
            --region=asia-south1 \
            --port=8000 \
            --add-cloudsql-instances=${GCP_PROJECT_ID}:asia-south1:compound-db \
            --set-env-vars="DATABASE_URL=postgresql+psycopg2://compound:CompoundDBPass2026!@/compound?host=/cloudsql/${GCP_PROJECT_ID}:asia-south1:compound-db,CORS_ORIGINS=*,AI_PROVIDER=gemini,AI_MODEL=gemini-2.5-flash,GEMINI_API_KEY=${GEMINI_API_KEY},APP_PASSWORD=${APP_PASSWORD}" \
            --update-annotations=run.googleapis.com/invoker-iam-disabled=true \
            --no-allow-unauthenticated \
            --project=${GCP_PROJECT_ID}
          
          # Output the URL
          url=$(gcloud run services describe compound-api --region=asia-south1 --format="value(status.url)" --project=${GCP_PROJECT_ID})
          echo "backend_url=$url" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend
        run: |
          gcloud builds submit --config=cloudbuild-frontend.yaml \
            --substitutions=_NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.backend_url }}/api \
            . --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Frontend to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          gcloud run deploy compound-web \
            --image=asia-south1-docker.pkg.dev/${GCP_PROJECT_ID}/compound/web:latest \
            --platform=managed \
            --region=asia-south1 \
            --port=3000 \
            --set-env-vars="APP_PASSWORD=${APP_PASSWORD}" \
            --update-annotations=run.googleapis.com/invoker-iam-disabled=true \
            --no-allow-unauthenticated \
            --project=${GCP_PROJECT_ID}
